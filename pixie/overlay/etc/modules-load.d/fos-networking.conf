# Common NIC drivers — loaded at boot by OpenRC's modules service.
# These cover the majority of physical and virtual NICs found in
# PXE-booted environments (QEMU/Proxmox, VMware, VirtualBox, bare metal).
#
# Only the drivers likely to be present in the kernel tree are listed;
# modprobe silently skips missing ones.

# VirtIO (QEMU, Proxmox, KVM)
virtio_net

# Intel PRO/1000 family (very common — VMware default, many servers)
e1000
e1000e
igb
igc

# Realtek (common on consumer motherboards)
r8169

# Broadcom
tg3
bnx2

# AMD/VMware
pcnet32
vmxnet3

# Other common
8139cp
8139too
forcedeth
